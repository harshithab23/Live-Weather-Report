name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Change to match your version if needed

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1 libglib2.0-0

    - name: Upgrade pip and tools
      run: python -m pip install --upgrade pip setuptools wheel

    - name: Remove Windows-only packages
      run: sed -i '/pywin/d' requirements.txt

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run tests with pytest
      run: pytest
